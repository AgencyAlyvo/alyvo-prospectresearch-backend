apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prod-seatyrants-website-backend-ingress
  namespace: prod-seatyrants-website-backend
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.seatyrants.com
      secretName: letsencrypt-production
  rules:
    - host: api.seatyrants.com
      http:
        paths:
          - pathType: Prefix
            path: '/'
            backend:
              service:
                name: prod-seatyrants-website-backend-service
                port:
                  number: 3333

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: staging-seatyrants-website-backend-ingress
  namespace: staging-seatyrants-website-backend
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.api.seatyrants.com
      secretName: staging-seatyrants-api-tls
  rules:
    - host: staging.api.seatyrants.com
      http:
        paths:
          - pathType: Prefix
            path: '/'
            backend:
              service:
                name: staging-seatyrants-website-backend-service
                port:
                  number: 3333

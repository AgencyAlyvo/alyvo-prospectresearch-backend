name: tests_build_deploy_cluster_staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  tests_build_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Decode .env.keys file
        run: |
          echo "${{ secrets.ENCRYPTED_ENV_KEYS_ADONISJS }}" | base64 --decode > .env.keys

      - name: Install Node.js to specific version LTS and setup cache
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies for project
        run: npm install

      - name: Lint TypeScript and ESLint
        run: npm run lint:ts && npm run lint:eslint

      #- name: Japa - Run Unit and Functional tests
      #  run: npm run test:all

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/staging/Dockerfile
          push: true
          tags: corentin35/seatyrants-website-backend:staging-${{ github.sha }}

      - name: Replace image tag in deployment.yaml and worker-deployment.yaml for Kubernetes
        run: |
          sed -i 's/\${TAG_VERSION}/'${{ github.sha }}'/g' k8s/staging/deployment.yaml
          sed -i 's/\${TAG_VERSION}/'${{ github.sha }}'/g' k8s/staging/worker-deployment.yaml

      - name: Connect to the cluster K3S for deploy
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBECONFIG_CLUSTER_STAGING_CRZGAMES_BASE64 }}
        with:
          args: |
            apply -f k8s/staging/namespace.yaml
            -f k8s/staging/docker-registry-secret.yaml
            -f k8s/staging/deployment.yaml
            -f k8s/staging/worker-deployment.yaml
            -f k8s/staging/ingress.yaml
            -f k8s/staging/service.yaml
